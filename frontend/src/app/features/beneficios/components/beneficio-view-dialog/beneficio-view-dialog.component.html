<h2 mat-dialog-title>Detalhes do benefício</h2>
<mat-dialog-content>
  <div class="beneficio-view">
    <div class="view-row">
      <span class="label">Nome</span>
      <span class="value">{{ data.nome }}</span>
    </div>
    <div class="view-row">
      <span class="label">Descrição</span>
      <span class="value">{{ data.descricao || 'Sem descrição' }}</span>
    </div>
    <div class="view-row">
      <span class="label">Valor</span>
      <span class="value">{{ formattedValor }}</span>
    </div>
    <div class="view-row">
      <span class="label">Status</span>
      <span class="value status" [class.active]="data.ativo" [class.inactive]="!data.ativo">
        {{ data.ativo ? 'Ativo' : 'Inativo' }}
      </span>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" mat-dialog-close>Fechar</button>
</mat-dialog-actions>
