spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://db:5432/bipdb
    username: bip
    password: bip
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false

cors:
  allowed-origins: http://localhost:4200

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/docs
