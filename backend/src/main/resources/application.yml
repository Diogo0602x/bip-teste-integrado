spring:
  datasource:
    url: jdbc:h2:mem:bipdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/docs
