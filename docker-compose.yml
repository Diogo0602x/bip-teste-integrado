services:
  db:
    image: postgres:16-alpine
    container_name: bip-db
    environment:
      POSTGRES_DB: bipdb
      POSTGRES_USER: bip
      POSTGRES_PASSWORD: bip
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bip -d bipdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bip-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    volumes:
      - ./backend:/workspace
      - m2_cache:/root/.m2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bip-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules

volumes:
  db_data:
  m2_cache:
  frontend_node_modules:
